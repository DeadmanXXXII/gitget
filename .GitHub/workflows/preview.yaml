name: Preview DeadGet v3 README

on:
  # This allows you to manually trigger the workflow from the GitHub Actions tab
  workflow_dispatch: 
    inputs:
      username:
        description: 'GitHub Username to generate portfolio for'
        required: true
        default: 'DeadmanXXXII'

jobs:
  generate-and-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run DeadGet v3
        env:
          # Uses the Personal Access Token you will store in GitHub Secrets
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          chmod +x deadget_v3.py
          ./deadget_v3.py ${{ github.event.inputs.username }}

      - name: Upload Generated README as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated-Portfolio-README
          path: README_${{ github.event.inputs.username }}.md
          retention-days: 5
